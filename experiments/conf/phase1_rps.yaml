# @package _global_
# Phase 1 Week 1 — RPS self-play convergence experiment.
# Overrides:
#   uv run python -m experiments.phase1_rps_convergence iterations=100

experiment_name: phase1_rps_selfplay
iterations: 10000
seeds: [42, 123, 456]
log_every: 100
num_players: 2        # RPS self-play is fixed at 2
n_actions: 3          # rock / paper / scissors
checkpoint_every: null  # unused in Phase 1; placeholder for Phase 2+

# Convergence metrics (both logged; L1 is the more standard CFR summary).
metrics:
  - l_inf            # max_a |avg_strategy[a] - uniform[a]|
  - l1               # sum_a |avg_strategy[a] - uniform[a]|

wandb:
  project: poker-ai-hunl
  tags: [phase1, rps, regret-matching]
  mode: online       # set to "disabled" for pure local runs

# Route every Hydra run to experiments/outputs/<experiment_name>/<timestamp>/
# .gitignore already excludes outputs/ and multirun/.
hydra:
  run:
    dir: experiments/outputs/${experiment_name}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: experiments/outputs/${experiment_name}/multirun/${now:%Y%m%d-%H%M%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false     # keep cwd = project root so relative imports work
