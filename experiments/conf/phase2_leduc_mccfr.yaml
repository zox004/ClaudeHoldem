# @package _global_
# Phase 2 Week 2 Day 6 — Leduc MCCFR (External Sampling, Lanctot 2009) 5-seed W&B run.
#
# Exit Criteria (ROADMAP Phase 2):
#   Exit #3: per-iter speedup ≥ 10× vs Vanilla CFR
#   Primary practical metric: wall-clock to expl < 1 mbb/g within one session
#
# Baselines (Phase 2 Day 4/5):
#   Vanilla 100k   = 1.48 mbb/g (Exit #1 FAIL, 2h 31min)
#   CFR+    ~2k    = 0.042 mbb/g (Exit #1 rescue, 151× speedup vs Vanilla)
#   MCCFR Kuhn 10k ≈ 12 mbb/g  (higher iter-count variance; wall-clock speedup on Leduc)
#
# Overrides:
#   uv run python -m experiments.phase2_leduc_mccfr iterations=1000  # smoke
#   uv run python -m experiments.phase2_leduc_mccfr parallel=false   # sequential debug
#   uv run python -m experiments.phase2_leduc_mccfr wandb.mode=disabled

experiment_name: phase2_leduc_mccfr
iterations: 100000
seeds: [42, 123, 456, 789, 1024]
epsilon: 0.05         # ε-exploration (Lanctot §3.2)
n_actions: 3          # Leduc: FOLD, CALL, RAISE
big_blind: 2.0        # Leduc round-1 bet size convention

# Parallel execution across seeds (multiprocessing.Pool).
# Wall-clock: parallel ~17min, sequential ~85min at iter_per_sec ≥ 100.
parallel: true

# Log cadence: dense prefix + sparse tail. Cheaper per-iter MCCFR means
# we can afford denser logging than Vanilla/CFR+ (500 → 200).
log_every: 200
dense_prefix: 10

# Exit Criterion (Phase 2 Exit #1 rescue attempt via MCCFR).
exit_criterion_mbb: 1.0
expected_final_mbb: 0.5           # loose estimate; MCCFR iter-count slower
vanilla_baseline_mbb: 1.4802      # Vanilla 100k baseline (Day 4)
cfr_plus_baseline_mbb: 0.042      # CFR+ @ 2k baseline (Day 5 diagnostic)

wandb:
  project: poker-ai-hunl
  tags: [phase2, leduc, mccfr, external-sampling]
  mode: online

hydra:
  run:
    dir: experiments/outputs/${experiment_name}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: experiments/outputs/${experiment_name}/multirun/${now:%Y%m%d-%H%M%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
