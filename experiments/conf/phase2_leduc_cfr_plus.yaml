# @package _global_
# Phase 2 Week 1 Day 5+ — Leduc Hold'em CFR+ (Tammelin 2014) convergence.
# Vanilla CFR baseline: 1.4802 mbb/g @ 100k (Exit #1 failed by 48%).
# CFR+ expected to massively outperform — Tammelin Fig 2 predicts
# sub-0.05 mbb/g @ 100k. Our 2k measurement was already 0.042 mbb/g.
#
# Overrides:
#   uv run python -m experiments.phase2_leduc_cfr_plus iterations=1000
#   uv run python -m experiments.phase2_leduc_cfr_plus wandb.mode=disabled

experiment_name: phase2_leduc_cfr_plus
iterations: 100000
seed: 42  # Single seed since CFR+ is deterministic (tabular).
n_actions: 3  # Leduc: FOLD, CALL, RAISE
big_blind: 2.0  # Leduc round-1 bet size convention

# Log cadence: dense prefix + sparse tail (matches Phase 2 Vanilla harness).
log_every: 500
dense_prefix: 10

# Exit Criteria (Phase 2 acceptance gates).
exit_criterion_mbb: 0.05          # Tammelin Fig 2 @ 100k expectation
expected_final_mbb: 0.01          # Stretch target (slope from 2k=0.042 suggests ~0.005-0.01)
vanilla_baseline_mbb: 1.4802      # Vanilla CFR 100k baseline (Day 4 measurement) — speedup calc target

wandb:
  project: poker-ai-hunl
  tags: [phase2, leduc, cfr-plus]
  mode: online

hydra:
  run:
    dir: experiments/outputs/${experiment_name}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: experiments/outputs/${experiment_name}/multirun/${now:%Y%m%d-%H%M%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
