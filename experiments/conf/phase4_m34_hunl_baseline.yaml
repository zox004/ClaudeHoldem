# @package _global_
# Phase 4 M3.4 — AbstractedHUNL 5-seed × 3-anchor LBR baseline.
#
# Production setup (M3.1 docstring "5000+" guidance + n_buckets=50 default):
#   n_buckets=50, n_trials=10000, postflop_mc_trials=300,
#   postflop_threshold_sample_size=10000.
#
# T anchors: {1k, 10k, 100k} (asset #11 T≥50 smoke + #18 T-large ADVERSE check).
# Seeds: 5 (asset #15 σ_seed pattern).
# LBR n_samples=2000 paired (pilot SE/value ~14% projected).
#
# Wall-clock estimate (parallel 5-seed): ~45min.
#
# Overrides:
#   uv run python -m experiments.phase4_m34_hunl_baseline                # full run
#   uv run python -m experiments.phase4_m34_hunl_baseline t_anchors=[100,1000]  # smoke
#   uv run python -m experiments.phase4_m34_hunl_baseline parallel=false # sequential
#   uv run python -m experiments.phase4_m34_hunl_baseline wandb.mode=disabled

experiment_name: phase4_m34_hunl_baseline

# Game configuration (production default; M3.1 docstring guidance).
n_buckets: 50
n_trials: 10000                       # preflop HUNLCardAbstractor MC trials
postflop_mc_trials: 300                # PostflopBoardAbstractor MC trials
postflop_threshold_sample_size: 10000  # PostflopBoardAbstractor threshold pairs

# MCCFR.
n_actions: 6                          # AbstractedHUNLAction grid
epsilon: 0.05                         # ε-exploration (Lanctot §3.2)
t_anchors: [1000, 10000, 100000]      # cumulative MCCFR iterations

# LBR baseline.
n_samples_lbr: 2000                   # SE/value ~14% projected from pilot
lbr_paired: true                      # control variate variance reduction

# Seeds.
seeds: [42, 123, 456, 789, 1024]
parallel: true                        # multiprocessing.Pool 5 worker

wandb:
  project: poker-ai-hunl
  tags: [phase4, m34, hunl, abstracted, lbr-baseline]
  mode: online

hydra:
  run:
    dir: experiments/outputs/${experiment_name}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: experiments/outputs/${experiment_name}/multirun/${now:%Y%m%d-%H%M%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
